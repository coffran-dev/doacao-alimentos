<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ação Social — 5ª Igreja Presbiteriana Itabuna</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12140E">
<meta name="description" content="Gestão de arrecadação de alimentos, estoque, cestas básicas e famílias atendidas.">

<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<body>

<div class="mobile-topbar">
  <button id="menuToggle" aria-label="Abrir menu">☰</button>
  <strong id="mobileTitle">Ação Social</strong>
</div>

<div class="app-shell">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img class="brand-mark" src="assets/logo-icone.png" alt="5ª Igreja Presbiteriana Itabuna">
      <div class="brand-text">5ª IPI<small>Ação Social</small></div>
    </div>

    <ul class="nav-list" id="navList">
      <li><button class="nav-item" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="5" rx="1.5"/><rect x="13" y="12" width="8" height="9" rx="1.5"/><rect x="3" y="15" width="8" height="6" rx="1.5"/></svg>

      </button></li>
      <li><button class="nav-item" data-view="doadores">

      <li><button class="nav-item" data-view="compromissos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3.5" y="4.5" width="17" height="16" rx="2"/><path d="M3.5 9.5h17"/><path d="M8 3v3M16 3v3"/><path d="M7.5 13.5h3M7.5 17h6"/></svg>
        Compromissos
      </button></li>
      <li><button class="nav-item" data-view="estoque">

        Estoque
      </button></li>
      <li><button class="nav-item" data-view="cestas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 10l7-5.5L19 10"/><path d="M5 10l1.8 10h10.4L19 10"/><path d="M5 10h14"/></svg>
        Modelos de Cesta
      </button></li>
      <li><button class="nav-item" data-view="familias">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="7" r="2.6"/><circle cx="16.2" cy="7.6" r="2"/><path d="M3 20c0-3.3 2.4-5.7 5-5.7s5 2.4 5 5.7"/><path d="M13.5 20c.2-2.6 1.8-4.6 3.8-4.6 1.7 0 3.2 1.4 3.5 3.4"/></svg>
        Famílias
      </button></li>
      <li><button class="nav-item" data-view="entregas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>

<div id="modalRoot"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/dashboard.js"></script>

<script src="js/familias.js"></script>
<script src="js/entregas.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch((err) => {
        console.warn('Service worker não registrado:', err);
      });
    });
  }
</script>
